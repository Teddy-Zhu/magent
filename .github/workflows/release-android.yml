name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  build-android:
    name: Build Android release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        working-directory: magent_app
        run: flutter pub get

      - name: Build release APK
        working-directory: magent_app
        run: flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          APK_NAME="magent-android-${VERSION}-release.apk"
          mkdir -p release
          cp magent_app/build/app/outputs/flutter-apk/app-release.apk "release/${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: release/${{ env.APK_NAME }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: magent-android-${{ inputs.version }}
          name: Magent Android ${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          files: release/${{ env.APK_NAME }}
          fail_on_unmatched_files: true
          prerelease: false
          make_latest: true
