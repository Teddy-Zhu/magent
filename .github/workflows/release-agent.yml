name: Release Agent

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: magent
  GO_VERSION: "1.23.x"

jobs:
  build-agent:
    name: Build agent (linux-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          GIT_COMMIT="$(git rev-parse --short=12 HEAD)"
          echo "build_time=${BUILD_TIME}" >> "${GITHUB_OUTPUT}"
          echo "git_commit=${GIT_COMMIT}" >> "${GITHUB_OUTPUT}"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.value }} -X main.buildTime=${{ steps.meta.outputs.build_time }} -X main.gitCommit=${{ steps.meta.outputs.git_commit }}" \
            -o "dist/${APP_NAME}" \
            ./agent/cmd/magent

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          PLATFORM="linux-${{ matrix.goarch }}"
          mkdir -p release
          ARCHIVE="${APP_NAME}-${VERSION}-${PLATFORM}.tar.gz"
          tar -C dist -czf "release/${ARCHIVE}" "${APP_NAME}"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: release/${{ env.ARCHIVE }}
          if-no-files-found: error

  publish-agent:
    name: Publish agent release assets
    runs-on: ubuntu-latest
    needs: build-agent

    steps:
      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: magent-agent-${{ inputs.version }}
          name: Magent Agent ${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          files: release/*
          fail_on_unmatched_files: true
          prerelease: false
          make_latest: true
